name: Refresh MLB odds overlay

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/fetch_odds.py"
      - ".github/workflows/refresh-odds.yml"

concurrency:
  group: refresh-odds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-overlay:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch odds and build overlay
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_odds.py

      - name: Commit overlay if it changed
        run: |
          git config user.name  "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          if git diff --quiet odds_overlay.json 2>/dev/null; then
            echo "odds_overlay.json unchanged, skipping commit"
            exit 0
          fi
          git add odds_overlay.json
          git commit -m "chore(odds): refresh overlay $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
